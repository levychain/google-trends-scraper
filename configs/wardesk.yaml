# War Desk Series — Google Trends Configuration
# Geopolitical conflicts, military strategy, international relations

series: "War Desk"
description: "Geopolitical conflicts and military strategy analysis"

# Primary keywords to track
anchors:
  - "war"
  - "conflict"
  - "geopolitics"

# Intent domain for semantic relevance scoring
intent_domain: "geopolitics, military, war, conflict, international relations, defense, foreign policy, NATO, sanctions, nuclear, intelligence, military strategy, armed conflict, defense policy"

# Google Trends categories to prioritize
trending_categories:
  - 3   # Business & Finance
  - 14  # Politics

# Geographic focus
geo: "US"
timeframe: "today 12-m"

# Seed keywords for discovery (topics to track)
seed_keywords:
  - "Iran conflict"
  - "Ukraine war"
  - "China military"
  - "Middle East tension"
  - "NATO expansion"
  - "nuclear threat"
  - "trade sanctions"
  - "defense spending"
  - "military intelligence"
  - "geopolitical crisis"

# Reference benchmarks for comparison
reference_keywords:
  - "Russia Ukraine"
  - "China Taiwan"
  - "Middle East conflict"

# Scoring thresholds
min_momentum: 1.5
min_avg_interest: 8
discovery_limit: 50
