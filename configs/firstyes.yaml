# The First Yes Series — Google Trends Configuration
# Startups, venture capital, entrepreneurship, and founder stories

series: "The First Yes"
description: "Startup culture, venture capital, early-stage entrepreneurship, and founder journeys"

# Primary keywords to track
anchors:
  - "startup"
  - "venture capital"
  - "entrepreneurship"

# Intent domain for semantic relevance scoring
intent_domain: "startups, founders, venture capital, entrepreneurship, Series A, product market fit, tech startups, startup funding, pitch deck, founder story, venture funding, startup ecosystem, innovation, angel investor, startup growth"

# Google Trends categories to prioritize
trending_categories:
  - 3   # Business & Finance
  - 6   # Computers & Electronics

# Geographic focus
geo: "US"
timeframe: "today 12-m"

# Seed keywords for discovery
seed_keywords:
  - "startup funding"
  - "venture capital"
  - "founder story"
  - "Series A funding"
  - "startup pitch"
  - "product market fit"
  - "angel investor"
  - "tech startup"
  - "startup ecosystem"
  - "early stage startup"
  - "startup success"
  - "entrepreneur"

# Reference benchmarks for comparison
reference_keywords:
  - "venture capital"
  - "startup funding"
  - "entrepreneurship"

# Scoring thresholds
min_momentum: 1.3
min_avg_interest: 7
discovery_limit: 50
